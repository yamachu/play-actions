name: Comment Handle Runner
on:
  issue_comment:
    types: [created]

jobs:
  CommentHandle:
    if: (contains(github.event.comment.body, '/qm') && github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    steps:
      - uses: yamachu/merge-queue-action/precheck@main
        with:
          required-codeowners: 'false'
      - name: Dispatch workflow via GitHub CLI
        run: |
          gh workflow run -R ${{ github.event.repository.full_name }} -f repo=${{ github.event.repository.name }} -f owner=${{ github.event.repository.owner.login }} -f issue_number=${{ github.event.issue.number }} testing-queue.yml
