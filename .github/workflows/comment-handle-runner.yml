name: Comment Handle Runner
on:
  issue_comment:
    types: [created]

jobs:
  CommentHandle:
    if: (contains(github.event.comment.body, '/queue-merge') && github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        name: Is this PR mergeable?
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const { data } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number
            });
            if (data.mergeable === false) {
              throw new Error('The pull request is not mergeable due to conflicts.');
            } else {
              console.log('The pull request is mergeable.');
            }
      - uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const comment_body = `Run state: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const issue_comment = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: comment_body,
            });

  RunJobs:
    runs-on: ubuntu-latest
    needs: [CommentHandle]
    concurrency:
      group: queue-merge
      cancel-in-progress: false
      queue: max
    steps:
      - uses: actions/github-script@v7
        name: Is this PR mergeable?
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const { data } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number
            });
            if (data.mergeable === false) {
              throw new Error('The pull request is not mergeable due to conflicts.');
            } else {
              console.log('The pull request is mergeable.');
            }
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Delete auto.tmp branch
        run: |
          git push origin --delete auto.tmp || :
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/github-script@v7
        id: get_base_branch
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const { data } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number
            });
            return data.base.ref;
      - uses: actions/github-script@v7
        id: get_base_branch_head
        with:
          script: |
            const { owner, repo } = context.repo;
            const base_branch_name = ${{ steps.get_base_branch.outputs.result }};
            const { data } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${base_branch_name}`,
            });
            return data.object.sha;
      - name: Merge the base branch into the PR branch and push as auto.tmp
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git pull origin ${{ steps.get_base_branch.outputs.result }}
          gh pr checkout ${{ github.event.issue.number }}
          git merge ${{ steps.get_base_branch.outputs.result }}

          git push origin HEAD:auto.tmp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/github-script@v7
        name: run test for auto.tmp branch and await...
        with:
          script: |
            const script = require('${{ github.workspace }}/.github/scripts/wait.js')
            await script({ context })
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const { data } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number
            });
            if (data.mergeable === false) {
              throw new Error('The pull request is not mergeable due to conflicts.');
            } else {
              console.log('The pull request is mergeable.');
            }
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const base_branch_name = ${{ steps.get_base_branch.outputs.result }};
            const { data } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${base_branch_name}`,
            });
            const currentSha = data.object.sha;
            if (currentSha !== ${{ steps.get_base_branch_head.outputs.result }}) {
              throw new Error('The base branch has been updated since the last check.');
            }
      - name: Merge the auto.tmp branch into the base branch
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          gh pr merge ${{ github.event.issue.number }} -m
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
